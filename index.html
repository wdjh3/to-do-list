<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Document</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=check,close,delete,edit,keyboard_arrow_down"/><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"><script defer="defer" src="main.js"></script></head><body><div class="projects-section" id="projects-section"><h1 class="project-list-title" id="project-list-title">Projects</h1><div class="flexible project-list" id="project-list"></div><div id="add-new-project" class="add-project">+ Add new project...</div></div><div class="project" id="project"><h1 class="current-project-title" id="current-project-title">Project name...</h1><div class="flexible current-project" id="current-project"></div><div id="add-new-task" class="add-task">+ Add new task...</div></div><dialog id="project-form-dialog" class="form-dialog"><form action="" method="dialog" class="input-form"><input type="hidden" name="item-type" value="project"> <input type="hidden" name="project-id" value=""><div class="header"><h2 class="title">Add project</h2><button type="button" value="cancel" formnovalidate class="cancel-button button"><span class="material-symbols-outlined">close</span></button></div><div class="input-unit"><label for="project-title">Project Title*</label><input required name="project-title" id="project-title"></div><button type="submit" value="submit">Add Project</button></form></dialog><dialog id="task-form-dialog" class="form-dialog"><form action="" method="dialog" class="input-form"><input type="hidden" name="item-type" value="task"> <input type="hidden" name="task-id" value=""><div class="header"><h2 class="title">Add task</h2><button type="button" value="cancel" formnovalidate class="cancel-button button"><span class="material-symbols-outlined">close</span></button></div><div class="input-unit"><label for="task-title">Task Title*</label><input required name="task-title" id="task-title"></div><div class="input-unit"><label for="task-due-date">Due Date</label><input type="date" name="task-due-date" id="task-due-date"></div><div class="input-unit"><label for="task-priority">Priority</label> <select name="task-priority" id="task-priority" class="task-priority-selection"><option value="high">High</option><option value="medium">Medium</option><option selected="selected" value="low">Low</option></select></div><div class="input-unit"><label for="task-description">Description</label><input name="task-description" id="task-description"></div><button type="submit" value="submit">Add Task</button></form></dialog><dialog id="checklist-item-form-dialog" class="form-dialog"><form action="" method="dialog" class="input-form"><input type="hidden" name="item-type" value="checklist-item"> <input type="hidden" name="task-id" value=""> <input type="hidden" name="checklist-item-id" value=""><div class="header"><h2 class="title">Add checklist item</h2><button type="button" value="cancel" formnovalidate class="cancel-button button"><span class="material-symbols-outlined">close</span></button></div><div class="input-unit"><label for="checklist-item-title">Item title*</label><input required name="checklist-item-title" id="checklist-item-title"></div><div class="input-unit"><label for="checklist-item-description">Description</label><input name="checklist-item-description" id="checklist-item-description"></div><button type="submit" value="submit">Add Checklist Item</button></form></dialog></body></html>
